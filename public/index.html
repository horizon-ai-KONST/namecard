<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#fafaf8" />
<title>Console · 名片夾</title>
<link rel="manifest" href="/manifest.json" />
<link rel="stylesheet" href="/style.css" />
<script>
  // Inline boot — apply cached flavor immediately to prevent brand flash.
  // After /api/config loads, console.js refreshes the cache.
  (function () {
    try {
      const f = sessionStorage.getItem('cardapp.flavor');
      if (f) document.documentElement.dataset.flavor = f;
    } catch (e) {}
  })();
</script>
<style>
  /* Hide body until brand config is applied — avoids wrong-brand flash. */
  body { opacity: 0; }
  body.ready { opacity: 1; transition: opacity .15s ease; }
</style>
</head>
<body>
  <main id="console">
    <header class="topbar">
      <div class="brand"><span data-brand-name></span><span class="divider">·</span><span data-brand-tagline></span> Console</div>
    </header>

    <!-- VIEW: Mode picker -->
    <section id="view-modes" class="view active">
      <h1 class="view-title">今天要做什麼？</h1>
      <p class="view-sub">選擇一個情境開始掃描名片</p>
      <p class="brand-subtagline" data-brand-subtagline hidden></p>

      <div class="mode-grid">
        <button class="mode-card" data-mode="tradeshow">
          <div class="mode-emoji">🎪</div>
          <div class="mode-name">展場名片交換</div>
          <div class="mode-desc">掃描後自動發 greeting 信，並在展場螢幕即時顯示</div>
        </button>

        <button class="mode-card" data-mode="daily">
          <div class="mode-emoji">📇</div>
          <div class="mode-name">日常紀錄</div>
          <div class="mode-desc">純粹歸檔到 Lark，不發信，事後可手動補發</div>
        </button>

        <button class="mode-card" data-mode="visit">
          <div class="mode-emoji">🤝</div>
          <div class="mode-name">客戶拜訪</div>
          <div class="mode-desc">歸檔 + 加會議備註，方便日後 follow up</div>
        </button>
      </div>

      <div class="console-actions">
        <button id="btnBatch" class="link-btn">📥 批次匯入既有名片 →</button>
        <button id="btnRecent" class="link-btn">📋 看歷史名片 / 補發 greeting →</button>
        <a id="lnkBitable" class="link-btn" href="#" target="_blank" rel="noopener" hidden>🗂 在 Lark 多維表格打開 ↗</a>
      </div>

      <div class="watermark" data-brand-watermark></div>
    </section>

    <!-- VIEW: Event setup (only for tradeshow mode) -->
    <section id="view-event" class="view">
      <header class="topbar inner">
        <button class="iconbtn" data-back-modes>←</button>
        <div class="brand">展場資訊</div>
      </header>

      <h1 class="view-title">這場展會是？</h1>
      <p class="view-sub">展會名稱會寫進每一張名片，方便日後 filter</p>

      <div class="event-input-wrap">
        <input id="eventInput" type="text" placeholder="例：COMPUTEX 2026" autocomplete="off" />
      </div>

      <div id="eventHistory" class="event-history">
        <!-- recent events populated here -->
      </div>

      <div class="actions vertical">
        <button id="btnStartTradeshow" class="btn primary" disabled>開始掃描</button>
        <a class="btn secondary" href="/display.html" target="_blank" data-needs-display>在另一螢幕打開展場顯示牆 ↗</a>
      </div>
    </section>

    <!-- VIEW: Batch import (existing namecards) -->
    <section id="view-batch" class="view">
      <header class="topbar inner">
        <button class="iconbtn" data-back-modes>←</button>
        <div class="brand">批次匯入</div>
      </header>

      <h1 class="view-title">一次傳多張既有名片</h1>
      <p class="view-sub">適合處理累積已久的紙本名片。每張會自動 OCR 並寫入 Lark，不發信、不出現在展場顯示牆。低信心欄位會在備註標註，方便事後到 Lark 修正。</p>

      <div class="batch-picker">
        <input id="batchFileInput" type="file" accept="image/*" multiple hidden />
        <button id="btnPickFiles" class="btn primary">🖼 選取多張圖片</button>
        <div class="batch-hint">建議單次 ≤ 20 張，避免處理過久</div>
      </div>

      <div id="batchProgress" class="batch-progress" hidden>
        <div class="batch-summary">
          <span id="batchCountDone">0</span> / <span id="batchCountTotal">0</span> 已處理
          <span class="batch-status-pill" id="batchOverall">處理中…</span>
        </div>
        <div id="batchList" class="batch-list"></div>
        <div class="actions">
          <button id="btnBatchDone" class="btn primary" hidden>完成，回首頁</button>
        </div>
      </div>
    </section>

    <!-- VIEW: Recent records / resend -->
    <section id="view-recent" class="view">
      <header class="topbar inner">
        <button class="iconbtn" data-back-modes>←</button>
        <div class="brand">歷史名片</div>
      </header>

      <p class="view-sub center">點任何一張未寄信的名片，可以立即補發 greeting</p>

      <div id="recentList" class="recent-list">
        <div class="empty">載入中…</div>
      </div>
    </section>
  </main>

  <script src="/console.js"></script>
</body>
</html>
