<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#fafaf8" />
<title>Console · Horizon AI 名片夾</title>
<link rel="manifest" href="/manifest.json" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="console">
    <header class="topbar">
      <div class="brand">HORIZON AI<span class="divider">·</span>名片夾 Console</div>
    </header>

    <!-- VIEW: Mode picker -->
    <section id="view-modes" class="view active">
      <h1 class="view-title">今天要做什麼？</h1>
      <p class="view-sub">選擇一個情境開始掃描名片</p>

      <div class="mode-grid">
        <button class="mode-card" data-mode="tradeshow">
          <div class="mode-emoji">🎪</div>
          <div class="mode-name">展場名片交換</div>
          <div class="mode-desc">掃描後自動發 greeting 信，並在展場螢幕即時顯示</div>
        </button>

        <button class="mode-card" data-mode="daily">
          <div class="mode-emoji">📇</div>
          <div class="mode-name">日常紀錄</div>
          <div class="mode-desc">純粹歸檔到 Lark，不發信，事後可手動補發</div>
        </button>

        <button class="mode-card" data-mode="visit">
          <div class="mode-emoji">🤝</div>
          <div class="mode-name">客戶拜訪</div>
          <div class="mode-desc">歸檔 + 加會議備註，方便日後 follow up</div>
        </button>
      </div>

      <div class="console-actions">
        <button id="btnRecent" class="link-btn">📋 看歷史名片 / 補發 greeting →</button>
      </div>

      <div class="watermark">Powered by Konst</div>
    </section>

    <!-- VIEW: Event setup (only for tradeshow mode) -->
    <section id="view-event" class="view">
      <header class="topbar inner">
        <button class="iconbtn" data-back-modes>←</button>
        <div class="brand">展場資訊</div>
      </header>

      <h1 class="view-title">這場展會是？</h1>
      <p class="view-sub">展會名稱會寫進每一張名片，方便日後 filter</p>

      <div class="event-input-wrap">
        <input id="eventInput" type="text" placeholder="例：COMPUTEX 2026" autocomplete="off" />
      </div>

      <div id="eventHistory" class="event-history">
        <!-- recent events populated here -->
      </div>

      <div class="actions vertical">
        <button id="btnStartTradeshow" class="btn primary" disabled>開始掃描</button>
        <a class="btn secondary" href="/display.html" target="_blank">在另一螢幕打開展場顯示牆 ↗</a>
      </div>
    </section>

    <!-- VIEW: Recent records / resend -->
    <section id="view-recent" class="view">
      <header class="topbar inner">
        <button class="iconbtn" data-back-modes>←</button>
        <div class="brand">歷史名片</div>
      </header>

      <p class="view-sub center">點任何一張未寄信的名片，可以立即補發 greeting</p>

      <div id="recentList" class="recent-list">
        <div class="empty">載入中…</div>
      </div>
    </section>
  </main>

  <script src="/console.js"></script>
</body>
</html>
